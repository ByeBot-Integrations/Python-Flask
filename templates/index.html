<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captchacat - Flask Demo</title>
  <script src="https://challenge.captchacat.com/ray/widget.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #666666;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a0a0a0;
      margin-bottom: 6px;
    }

    .form-field input {
      width: 100%;
      padding: 12px 14px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 14px;
      color: #ffffff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-field input::placeholder {
      color: #4a4a4a;
    }

    .form-field input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .captcha-widget {
      margin: 20px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 3v4M12 17v4M3 12h4M17 12h4"/>
        </svg>
      </div>
      <span class="logo-text">Flask Demo</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Captchacat integration example</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/submit" method="post">
      <div class="form-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="captcha-widget" data-sitekey="{{ site_key }}"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
